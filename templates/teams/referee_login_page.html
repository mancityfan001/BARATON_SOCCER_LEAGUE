<!DOCTYPE html>
<html>

<head>

    <title>Referee Login</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
        }

        .container{
            width:400px;
            margin:80px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:15px;
        }

        button{
            width:100%;
            padding:12px;
            background:teal;
            color:white;
            border:none;
            cursor:pointer;
        }

        a{
            text-decoration:none;
            color:teal;
        }

        p{
            text-align:center;
            margin-top:15px;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Referee Login</h1>

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <p>
        New Referee?
        <a href="/referee-login/">
            Register Here
        </a>
    </p>

</div>

</body>

</html>
