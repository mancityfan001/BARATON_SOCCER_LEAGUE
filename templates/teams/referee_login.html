<!DOCTYPE html>
<html>
<head>
    <title>Referee Login</title>

    <style>
        body{
            font-family:Arial;
            background:#f4f7fa;
        }

        .container{
            width:40%;
            margin:80px auto;
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            color:#00cfe8;
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            background:#00cfe8;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:5px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Referee Login</h1>

    <form method="POST">

        {% csrf_token %}

        <input type="text" name="username" placeholder="Username">

        <input type="password" name="password" placeholder="Password">

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
