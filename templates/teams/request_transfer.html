<!DOCTYPE html>
<html>
<head>
    <title>Request Transfer</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
        }

        .container{
            width:60%;
            margin:auto;
            margin-top:40px;
            background:white;
            padding:40px;
            border-radius:10px;
        }

        h1{
            color:#11c5d9;
        }

        input, select{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            background:#11c5d9;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:5px;
            cursor:pointer;
        }

        .success{
            background:#d4edda;
            color:green;
            padding:10px;
            margin-bottom:20px;
            border-radius:5px;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Player Transfer Request</h1>

    {% if success %}
        <div class="success">
            Transfer request submitted successfully.
        </div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        <label>Player Name</label>
       <select name="player">
        {% for player in players %}
        <option value="{{ player.id }}">
            {{ player.player_name }}
        </option>
    {% endfor %}
        </select>

        <label>Transfer From</label>
        <select name="from_team">
            {% for team in teams %}
                <option value="{{ team.id }}">
                    {{ team.name }}
                </option>
            {% endfor %}
        </select>

        <label>Transfer To</label>
        <select name="to_team">
            {% for team in teams %}
        <option value="{{ team.id }}">
            {{ team.name }}
        </option>
            {% endfor %}
        </select>

        <label>Transfer Fee</label>
        <input type="number" name="transfer_fee" step="0.01">

        <label>Transaction Code</label>
        <input type="text" name="transaction_code">

        <label>Proof of Payment</label>
        <input type="file" name="proof_of_payment">
       

        <button type="submit">
            Submit Transfer
        </button>

    </form>

</div>

</body>
</html>
