<!DOCTYPE html>
<html>

<head>

    <title>Coach Login</title>

    <style>

        body{
            font-family:Arial;
            background:#f2f2f2;
        }

        .login-box{

            width:350px;
            margin:100px auto;
            background:white;
            padding:30px;
            border-radius:10px;

        }

        input{

            width:100%;
            padding:10px;
            margin-top:10px;
            margin-bottom:20px;

        }

        button{

            width:100%;
            padding:12px;
            background:#00d9ff;
            border:none;
            font-weight:bold;
            cursor:pointer;

        }

        h2{
            text-align:center;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h2>Coach Login</h2>

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Username"
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
            >

            <button type="submit">

                Login

            </button>

        </form>

        <p>

            {{ error }}

        </p>

    </div>

</body>

</html>
