<html>

<head>
    <title>Coach Registration</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
        }

        .container{
            width:400px;
            margin:50px auto;
            background:white;
            padding:30px;
            border-radius:10px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
        }

        button{
            width:100%;
            padding:10px;
            margin-top:20px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Coach Registration</h2>

    <form method="POST">

        {% csrf_token %}

        {% if error %}
        <div style="
            background-color:ffdddd;
            color: red;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid red;
            border-radius: 5px;
        ">
        {{ error }}
        </div>
        {% endif %}
            
        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="text"
               name="full_name"
               placeholder="Full Name"
               required>

        <input type="email"
               name="email"
               placeholder="Email"
               required>

        <input type="text"
               name="team_name"
               placeholder="Team Name"
               required>

        <input type="text"
               name="phone_number"
               placeholder="Phone Number"
               required>

        <select name="category" required>
            <option value="">Select Category</option>
            <option value="Men">Men's Team</option>
            <option value="Ladies">Ladies Team</option>
        </select>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Register
        </button>

    </form>

</div>

</body>

</html>
